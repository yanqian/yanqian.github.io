<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Repository as Agent Harness</title>
  <desc id="desc">Human intent enters through chat or a control plane, then flows through a repository harness, agent work, verification, and repository improvement using only straight-line connections.</desc>
  <rect width="1200" height="760" fill="#ffffff"/>

  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#047857"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="60" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="32" font-weight="700" fill="#1e40af">Repository as Agent Harness</text>
  <text x="62" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17" fill="#64748b">Chat is where intent enters. The repository is where memory, rules, verification, and loop improvement compound.</text>

  <rect x="80" y="165" width="260" height="150" rx="16" fill="#fed7aa" stroke="#c2410c" stroke-width="2.5"/>
  <text x="210" y="210" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="21" font-weight="700" fill="#374151">Intent</text>
  <text x="210" y="244" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">chat · Telegram</text>
  <text x="210" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">Codex UI · SSH</text>

  <rect x="470" y="165" width="260" height="150" rx="16" fill="#a7f3d0" stroke="#047857" stroke-width="2.5"/>
  <text x="600" y="205" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700" fill="#374151">Repository Harness</text>
  <text x="600" y="238" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#374151">memory · contract · rules</text>
  <text x="600" y="264" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#374151">SPEC · feature list</text>
  <text x="600" y="290" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#374151">tests · init.sh · git</text>

  <rect x="860" y="165" width="260" height="150" rx="16" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2.5"/>
  <text x="990" y="210" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="21" font-weight="700" fill="#374151">Agent Work</text>
  <text x="990" y="244" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">coding agent</text>
  <text x="990" y="270" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">evaluator agent</text>

  <rect x="860" y="440" width="260" height="150" rx="16" fill="#fef3c7" stroke="#b45309" stroke-width="2.5"/>
  <text x="990" y="485" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700" fill="#374151">Verification</text>
  <text x="990" y="519" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">pass · fail</text>
  <text x="990" y="545" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">missing capability</text>

  <rect x="470" y="440" width="260" height="150" rx="16" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/>
  <text x="600" y="485" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700" fill="#374151">Improve Repo</text>
  <text x="600" y="519" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">script · test · doc</text>
  <text x="600" y="545" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#374151">rule · checklist · harness</text>

  <line x1="342" y1="240" x2="462" y2="240" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="402" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">instruction</text>

  <line x1="732" y1="240" x2="852" y2="240" stroke="#047857" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="792" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">context + rules</text>

  <line x1="990" y1="317" x2="990" y2="432" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="1010" y="382" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">verify</text>

  <line x1="858" y1="515" x2="738" y2="515" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="798" y="495" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">gap</text>

  <line x1="600" y1="438" x2="600" y2="323" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="620" y="386" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">better harness</text>

  <rect x="170" y="655" width="860" height="58" rx="14" fill="#1e293b"/>
  <text x="600" y="691" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">When the agent lacks a capability, make that capability repository state.</text>
</svg>
