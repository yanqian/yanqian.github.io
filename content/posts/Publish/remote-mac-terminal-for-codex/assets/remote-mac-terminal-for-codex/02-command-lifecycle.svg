<svg xmlns="http://www.w3.org/2000/svg" width="980" height="628" viewBox="0 -10 980 628" role="img"><rect x="0" y="-10" width="980" height="628" fill="#ffffff" /><defs><marker id="arrow-047857" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#047857" /></marker><marker id="arrow-1e3a5f" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#1e3a5f" /></marker><marker id="arrow-dc2626" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626" /></marker></defs><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="30" fill="#1e40af" text-anchor="start"><tspan x="40.0" y="60.0">Four Commands, Two Responsibilities</tspan></text><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#64748b" text-anchor="start"><tspan x="42.0" y="94.0">The Mac controls readiness. The phone controls tmux sessions.</tspan></text><rect x="40.0" y="135.0" width="900.0" height="145.0" rx="12" fill="#ecfdf5" stroke="#047857" stroke-width="2" /><rect x="40.0" y="330.0" width="900.0" height="145.0" rx="12" fill="#eff6ff" stroke="#1e3a5f" stroke-width="2" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#047857" text-anchor="start"><tspan x="65.0" y="170.0">On the Mac</tspan></text><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#1e40af" text-anchor="start"><tspan x="65.0" y="365.0">From the phone SSH session</tspan></text><rect x="250.0" y="185.0" width="250.0" height="65.0" rx="12" fill="#a7f3d0" stroke="#047857" stroke-width="2" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#374151" text-anchor="middle"><tspan x="375.0" y="224.0">mac-awake-on</tspan></text><rect x="610.0" y="185.0" width="250.0" height="65.0" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#374151" text-anchor="middle"><tspan x="735.0" y="224.0">mac-awake-off</tspan></text><rect x="250.0" y="380.0" width="250.0" height="65.0" rx="12" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#374151" text-anchor="middle"><tspan x="375.5" y="419.0">agent-new</tspan></text><rect x="610.0" y="380.0" width="250.0" height="65.0" rx="12" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#374151" text-anchor="middle"><tspan x="735.0" y="419.0">phone-disconnect</tspan></text><path d="M 380.0 255.0 L 380.0 365.0" fill="none" stroke="#047857" stroke-width="2" marker-end="url(#arrow-047857)" /><path d="M 510.0 412.0 L 600.0 412.0" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow-1e3a5f)" /><path d="M 735.0 375.0 L 735.0 265.0" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow-dc2626)" /><text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#1e40af" text-anchor="middle"><tspan x="510.0" y="544.0">Stopping the phone session is not the same</tspan><tspan x="510.0" y="569.0">as stopping the Mac readiness layer.</tspan></text></svg>
