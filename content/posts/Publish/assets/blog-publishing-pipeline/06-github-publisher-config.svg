<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -30 1320 550" width="1320" height="550">
<rect x="-20" y="-30" width="1320" height="550" fill="#ffffff"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#1e3a5f"/></marker></defs>
<text x="40" y="60.0" font-family="monospace" font-size="30" fill="#1e40af" text-anchor="start">GitHub Publisher: Configure the Boundary</text>
<text x="42" y="90.0" font-family="monospace" font-size="18" fill="#64748b" text-anchor="start">The important setting is not the tag alone. It is what folder is allowed to cross into the</text>
<text x="42" y="112.5" font-family="monospace" font-size="18" fill="#64748b" text-anchor="start">Hugo repo.</text>
<rect x="80" y="150" width="300" height="90" rx="10" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
<text x="230.0" y="180.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">Export source</text>
<text x="230.0" y="205.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">Publish/ only</text>
<rect x="500" y="150" width="300" height="90" rx="10" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2"/>
<text x="650.0" y="180.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">Target in repo</text>
<text x="650.0" y="205.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">content/posts/</text>
<rect x="920" y="150" width="300" height="90" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="1070.0" y="180.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">Filter</text>
<text x="1070.0" y="205.0" font-family="monospace" font-size="20" fill="#374151" text-anchor="middle">public-ready notes</text>
<polyline points="395,195 480,195" fill="none" stroke="#047857" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="815,195 900,195" fill="none" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="95" y="323.0" font-family="monospace" font-size="23" fill="#dc2626" text-anchor="start">Avoid this</text>
<rect x="90" y="345" width="360" height="95" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="270.0" y="372.0" font-family="monospace" font-size="17" fill="#374151" text-anchor="middle">00-Inbox/Test.md</text>
<text x="270.0" y="393.25" font-family="monospace" font-size="17" fill="#374151" text-anchor="middle">→ content/posts/00-Inbox/Test.md</text>
<text x="680" y="323.0" font-family="monospace" font-size="23" fill="#047857" text-anchor="start">Use this</text>
<rect x="675" y="345" width="420" height="95" rx="10" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
<text x="885.0" y="372.0" font-family="monospace" font-size="17" fill="#374151" text-anchor="middle">Publish/test.md</text>
<text x="885.0" y="393.25" font-family="monospace" font-size="17" fill="#374151" text-anchor="middle">→ content/posts/test.md</text>
<polyline points="475,392 645,392" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="570.0" y="368.0" font-family="monospace" font-size="18" fill="#64748b" text-anchor="middle">clean URL</text>
</svg>