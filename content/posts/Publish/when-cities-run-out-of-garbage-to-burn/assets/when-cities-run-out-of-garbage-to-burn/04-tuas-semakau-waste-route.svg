<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Singapore waste route from Tuas to Semakau</title>
  <desc id="desc">A simplified map showing daily waste moving to Tuas waste-to-energy facilities, ash moving to Tuas Marine Transfer Station, and barges carrying ash to Semakau Landfill.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c2410c"/>
    </marker>
    <style>
      text { font-family: Menlo, Monaco, Consolas, monospace; }
      .title { font-weight: 700; font-size: 30px; fill: #1e40af; }
      .subtitle { font-weight: 400; font-size: 17px; fill: #64748b; }
      .label { font-weight: 700; font-size: 18px; fill: #374151; }
      .small { font-weight: 400; font-size: 14px; fill: #64748b; }
      .tiny { font-weight: 400; font-size: 12px; fill: #64748b; }
      .mainland { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .sea { fill: #f8fafc; stroke: #93c5fd; stroke-width: 1.5; stroke-dasharray: 8 8; }
      .tuas { fill: #fed7aa; stroke: #c2410c; stroke-width: 2; }
      .semakau { fill: #a7f3d0; stroke: #047857; stroke-width: 2; }
      .neutral { fill: #ffffff; stroke: #1e3a5f; stroke-width: 2; }
      .flow { fill: none; stroke: #1e3a5f; stroke-width: 3; marker-end: url(#arrow-blue); }
      .barge { fill: none; stroke: #c2410c; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="56" y="58" class="title">Tuas to Semakau: Singapore's final waste route</text>
  <text x="58" y="88" class="subtitle">Simplified spatial model, not a scale map</text>

  <rect x="54" y="118" width="1172" height="520" rx="22" class="sea"/>
  <text x="968" y="620" class="tiny">South of mainland Singapore</text>

  <path class="mainland" d="M154 170 C275 126, 455 136, 605 160 C760 184, 908 162, 1044 216 C1104 240, 1114 294, 1060 330 C982 382, 818 366, 704 350 C588 334, 516 366, 382 354 C250 342, 146 310, 126 250 C116 216, 126 185, 154 170 Z"/>
  <text x="500" y="242" text-anchor="middle" class="label">Mainland Singapore</text>
  <text x="500" y="269" text-anchor="middle" class="small">where daily waste is collected</text>

  <rect x="165" y="304" width="190" height="76" rx="10" class="tuas"/>
  <text x="260" y="334" text-anchor="middle" class="label">Tuas</text>
  <text x="260" y="360" text-anchor="middle" class="small">WTE facilities</text>

  <rect x="248" y="420" width="246" height="78" rx="10" class="neutral"/>
  <text x="371" y="450" text-anchor="middle" class="label">Tuas Marine</text>
  <text x="371" y="476" text-anchor="middle" class="small">Transfer Station</text>

  <ellipse cx="826" cy="536" rx="162" ry="70" class="semakau"/>
  <text x="826" y="528" text-anchor="middle" class="label">Semakau Landfill</text>
  <text x="826" y="554" text-anchor="middle" class="small">ash + non-incinerable waste</text>

  <path d="M260 380 C286 402, 330 414, 371 420" class="flow"/>
  <text x="304" y="400" class="small">about 90% volume reduction</text>

  <path d="M494 460 C560 465, 625 495, 666 536" class="barge"/>
  <text x="552" y="480" class="small">ash is barged offshore</text>

  <rect x="844" y="176" width="278" height="100" rx="10" class="neutral"/>
  <text x="983" y="208" text-anchor="middle" class="label">What changes?</text>
  <text x="983" y="236" text-anchor="middle" class="small">The landfill receives</text>
  <text x="983" y="257" text-anchor="middle" class="small">less raw daily garbage.</text>

  <line x1="988" y1="536" x2="1012" y2="526" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 6"/>
  <rect x="1012" y="488" width="174" height="76" rx="10" class="neutral"/>
  <text x="1099" y="518" text-anchor="middle" class="label">Still finite</text>
  <text x="1099" y="544" text-anchor="middle" class="small">Even ash needs space</text>

  <circle cx="176" cy="330" r="6" fill="#c2410c"/>
  <circle cx="666" cy="536" r="6" fill="#047857"/>
</svg>
