<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="760" viewBox="0 0 1700 760" role="img" aria-labelledby="title desc">
  <title id="title">Singapore waste system flow</title>
  <desc id="desc">A two-route flow diagram showing daily waste splitting into a waste-to-energy route and a recycling route.</desc>
  <defs>
    <marker id="arrow-primary" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#047857"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c2410c"/>
    </marker>
    <style>
      text { font-family: Menlo, Monaco, Consolas, monospace; }
      .title { font-weight: 700; font-size: 30px; fill: #1e40af; }
      .subtitle { font-weight: 400; font-size: 16px; fill: #64748b; }
      .routeLabel { font-weight: 700; font-size: 15px; fill: #1e40af; }
      .boxtext { font-weight: 700; font-size: 15px; fill: #374151; }
      .detail { font-weight: 400; font-size: 13px; fill: #64748b; }
      .note { font-weight: 400; font-size: 14px; fill: #374151; }
      .primary { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .process { fill: #93c5fd; stroke: #1e3a5f; stroke-width: 2; }
      .decision { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .success { fill: #a7f3d0; stroke: #047857; stroke-width: 2; }
      .warning { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .neutral { fill: #ffffff; stroke: #1e3a5f; stroke-width: 2; }
      .arrow { fill: none; stroke: #1e3a5f; stroke-width: 3; marker-end: url(#arrow-primary); }
      .greenArrow { fill: none; stroke: #047857; stroke-width: 3; marker-end: url(#arrow-green); }
      .orangeArrow { fill: none; stroke: #c2410c; stroke-width: 3; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1500" height="760" fill="#ffffff"/>
  <text x="56" y="58" class="title">Singapore waste system: the bin is only the beginning</text>
  <text x="58" y="88" class="subtitle">One stream of daily waste splits into two routes: burn what remains, recover what can still be useful.</text>

  <rect x="58" y="330" width="200" height="100" rx="12" class="primary"/>
  <text x="158" y="366" text-anchor="middle" class="boxtext">Daily waste</text>
  <text x="158" y="390" text-anchor="middle" class="detail">homes, malls, offices</text>
  <text x="158" y="410" text-anchor="middle" class="detail">the public starting point</text>

  <text x="390" y="196" class="routeLabel">Waste-to-energy route</text>
  <rect x="390" y="216" width="220" height="108" rx="12" class="process"/>
  <text x="500" y="247" text-anchor="middle" class="boxtext">Waste-to-energy</text>
  <text x="500" y="271" text-anchor="middle" class="detail">burns combustible waste</text>
  <text x="500" y="293" text-anchor="middle" class="detail">volume reduced about 90%</text>

  <rect x="690" y="230" width="200" height="80" rx="12" class="decision"/>
  <text x="790" y="262" text-anchor="middle" class="boxtext">Ash + residue</text>
  <text x="790" y="286" text-anchor="middle" class="detail">smaller, not gone</text>

  <rect x="970" y="224" width="220" height="92" rx="12" class="success"/>
  <text x="1080" y="255" text-anchor="middle" class="boxtext">Recovery from ash</text>
  <text x="1080" y="279" text-anchor="middle" class="detail">metals + NEWSand</text>
  <text x="1080" y="299" text-anchor="middle" class="detail">less final landfill</text>

  <rect x="1270" y="230" width="176" height="80" rx="12" class="neutral"/>
  <text x="1358" y="262" text-anchor="middle" class="boxtext">Tuas Marine</text>
  <text x="1358" y="286" text-anchor="middle" class="detail">transfer by sea</text>

  <ellipse cx="1596" cy="270" rx="70" ry="46" class="warning"/>
  <text x="1596" y="265" text-anchor="middle" class="boxtext">Semakau</text>
  <text x="1596" y="287" text-anchor="middle" class="detail">finite</text>

  <path d="M258 380 C306 330, 342 270, 390 270" class="arrow"/>
  <path d="M610 270 L690 270" class="orangeArrow"/>
  <path d="M890 270 L970 270" class="greenArrow"/>
  <path d="M1190 270 L1270 270" class="arrow"/>
  <path d="M1446 270 L1526 270" class="orangeArrow"/>

  <text x="390" y="450" class="routeLabel">Recycling route</text>
  <rect x="390" y="466" width="220" height="108" rx="12" class="primary"/>
  <text x="500" y="497" text-anchor="middle" class="boxtext">Blue bin</text>
  <text x="500" y="519" text-anchor="middle" class="detail">paper, metal</text>
  <text x="500" y="539" text-anchor="middle" class="detail">plastic, glass</text>
  <text x="500" y="559" text-anchor="middle" class="detail">only if clean enough</text>

  <rect x="690" y="480" width="200" height="80" rx="12" class="decision"/>
  <text x="790" y="512" text-anchor="middle" class="boxtext">Recycling quality</text>
  <text x="790" y="536" text-anchor="middle" class="detail">no food, no liquids</text>

  <rect x="970" y="480" width="220" height="80" rx="12" class="success"/>
  <text x="1080" y="512" text-anchor="middle" class="boxtext">Material recovery</text>
  <text x="1080" y="536" text-anchor="middle" class="detail">less final waste</text>

  <rect x="1270" y="480" width="180" height="80" rx="12" class="success"/>
  <text x="1360" y="512" text-anchor="middle" class="boxtext">Useful inputs</text>
  <text x="1360" y="536" text-anchor="middle" class="detail">back into economy</text>

  <path d="M258 380 C306 430, 342 520, 390 520" class="greenArrow"/>
  <path d="M610 520 L690 520" class="greenArrow"/>
  <path d="M890 520 L970 520" class="greenArrow"/>
  <path d="M1190 520 L1270 520" class="greenArrow"/>

  <text x="58" y="700" class="note">The public question is simple: which bin? The system question is harder: how little finally reaches Semakau?</text>
</svg>
