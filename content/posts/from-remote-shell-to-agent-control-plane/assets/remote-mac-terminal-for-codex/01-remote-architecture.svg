<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="470" viewBox="0 -10 1060 470" role="img"><rect x="0" y="-10" width="1060" height="470" fill="#ffffff" /><defs><marker id="arrow-047857" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#047857" /></marker><marker id="arrow-1e3a5f" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#1e3a5f" /></marker></defs><text font-family="Menlo, Consolas, monospace" font-size="30" fill="#1e40af" text-anchor="start"><tspan x="40.0" y="60.0">Remote Codex Architecture</tspan></text><text font-family="Menlo, Consolas, monospace" font-size="18" fill="#64748b" text-anchor="start"><tspan x="42.0" y="94.0">The Mac must be awake and on Tailscale</tspan><tspan x="42.0" y="116.5">before the phone becomes the control surface.</tspan></text><rect x="60.0" y="170.0" width="180.0" height="110.0" rx="12" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2" /><text font-family="Menlo, Consolas, monospace" font-size="20" fill="#374151" text-anchor="middle"><tspan x="131.0" y="220.0">Phone</tspan><tspan x="131.0" y="245.0">Termius</tspan></text><rect x="430.0" y="170.0" width="220.0" height="110.0" rx="12" fill="#a7f3d0" stroke="#047857" stroke-width="2" /><text font-family="Menlo, Consolas, monospace" font-size="19" fill="#374151" text-anchor="middle"><tspan x="538.5" y="217.0">Tailscale</tspan><tspan x="538.5" y="240.8">private network</tspan></text><rect x="750.0" y="130.0" width="270.0" height="190.0" rx="12" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2" /><text font-family="Menlo, Consolas, monospace" font-size="21" fill="#374151" text-anchor="middle"><tspan x="882.3" y="176.0">Mac remote node</tspan></text><text font-family="Menlo, Consolas, monospace" font-size="18" fill="#374151" text-anchor="middle"><tspan x="859.1" y="223.0">SSH</tspan><tspan x="859.1" y="245.5">caffeinate -ims</tspan><tspan x="859.1" y="268.0">tmux sessions</tspan><tspan x="859.1" y="290.5">Codex / agent</tspan></text><path d="M 250.0 225.0 L 420.0 225.0" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow-1e3a5f)" /><path d="M 660.0 225.0 L 740.0 225.0" fill="none" stroke="#047857" stroke-width="2" marker-end="url(#arrow-047857)" /><rect x="263.0" y="184.0" width="144.0" height="30.0" rx="12" fill="#ffffff" stroke="#ffffff" stroke-width="1" /><text font-family="Menlo, Consolas, monospace" font-size="14" fill="#64748b" text-anchor="middle"><tspan x="335.0" y="204.5">SSH over 100.x.x.x</tspan></text><text font-family="Menlo, Consolas, monospace" font-size="20" fill="#1e40af" text-anchor="middle"><tspan x="465.0" y="390.0">Key idea: Tailscale and caffeinate make the Mac reachable first;</tspan><tspan x="465.0" y="415.0">tmux keeps the agent alive after the phone disconnects.</tspan></text></svg>
