{{- if isset .Site.Params "giscus" -}}
  {{- if and (isset .Site.Params.giscus "repo") (not (eq .Site.Params.giscus.repo "")) (eq (.Params.disableComments | default false) false) -}}
    <section class="post-comments giscus-comments" aria-labelledby="comments-title">
      <h2 id="comments-title">Comments</h2>
      <script>
        (() => {
          const container = document.currentScript.closest('.giscus-comments');
          const lightTheme = '{{ default "noborder_light" .Site.Params.giscus.theme }}';
          const darkTheme = '{{ default "noborder_dark" .Site.Params.giscus.darkTheme }}';

          function getSiteTheme() {
            const rememberedTheme = window.localStorage && window.localStorage.getItem('colorscheme');
            if (rememberedTheme === 'light' || rememberedTheme === 'dark') {
              return rememberedTheme;
            }

            if (document.body.classList.contains('colorscheme-light')) {
              return 'light';
            }

            if (document.body.classList.contains('colorscheme-dark')) {
              return 'dark';
            }

            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }

          function getGiscusTheme() {
            return getSiteTheme() === 'dark' ? darkTheme : lightTheme;
          }

          function syncGiscusTheme() {
            const iframe = document.querySelector('iframe.giscus-frame');
            if (!iframe) {
              return;
            }

            iframe.contentWindow.postMessage({
              giscus: {
                setConfig: {
                  theme: getGiscusTheme(),
                },
              },
            }, 'https://giscus.app');
          }

          const script = document.createElement('script');
          script.src = 'https://giscus.app/client.js';
          script.setAttribute('data-repo', '{{ .Site.Params.giscus.repo }}');
          script.setAttribute('data-repo-id', '{{ .Site.Params.giscus.repoID }}');
          script.setAttribute('data-category', '{{ .Site.Params.giscus.category }}');
          script.setAttribute('data-category-id', '{{ .Site.Params.giscus.categoryID }}');
          script.setAttribute('data-mapping', '{{ default "pathname" .Site.Params.giscus.mapping }}');
          script.setAttribute('data-term', '{{ .Site.Params.giscus.term }}');
          script.setAttribute('data-strict', '{{ default "0" .Site.Params.giscus.strict }}');
          script.setAttribute('data-reactions-enabled', '{{ default "1" .Site.Params.giscus.reactionsEnabled }}');
          script.setAttribute('data-emit-metadata', '{{ default "0" .Site.Params.giscus.emitMetadata }}');
          script.setAttribute('data-input-position', '{{ default "bottom" .Site.Params.giscus.inputPosition }}');
          script.setAttribute('data-theme', getGiscusTheme());
          script.setAttribute('data-lang', '{{ default "en" .Site.Params.giscus.lang }}');
          script.setAttribute('data-loading', '{{ default "lazy" .Site.Params.giscus.loading }}');
          script.setAttribute('crossorigin', 'anonymous');
          script.setAttribute('async', '');

          container.appendChild(script);
          document.addEventListener('themeChanged', syncGiscusTheme);
        })();
      </script>
    </section>
  {{- end -}}
{{- end -}}
