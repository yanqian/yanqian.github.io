<section class="container page">
  <article>
    <header>
      <h1 class="title">
        <a class="title-link" href="{{ .Permalink | safeURL }}">
          {{ .Title }}
        </a>
      </h1>
    </header>

    {{ if .Params.terminal }}
      <section class="terminal-block" aria-label="{{ i18n "identity_terminal" }}">
        <div class="terminal-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div class="terminal-body">
          <p>$ whoami</p>
          <p><strong>Armstrong Yan</strong></p>
          <p>-----------------</p>
          <p>{{ i18n "terminal_host" }}</p>
          <p>{{ i18n "terminal_kernel" }}</p>
          <p>{{ i18n "terminal_packages" }}</p>
          <p>{{ i18n "terminal_focus" }}</p>
          <p>$ _</p>
        </div>
      </section>
    {{ end }}

    {{ .Content }}
  </article>
</section>
