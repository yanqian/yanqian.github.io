{{ define "title" }}
  {{ .Title }} · {{ .Site.Title }}
{{ end }}

{{ define "content" }}
  <section class="container page list collection-page">
    <article>
      <header>
        <h1 class="title">
          <a class="title-link" href="{{ .Permalink | safeURL }}">{{ .Title }}</a>
        </h1>
      </header>

      <div class="collection-list">
        {{ range .Data.Terms.Alphabetical }}
          <article class="collection-row">
            <div>
              <a class="collection-title" href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
              <p>{{ .Count }} posts</p>
            </div>
          </article>
        {{ end }}
      </div>
    </article>
  </section>
{{ end }}
